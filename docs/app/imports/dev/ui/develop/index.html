<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Develop</title>
  <base href="./develop/">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Develop</a>
      <button class="btn btn-info float-right" onclick="recompile()">Compile</button>
    </div>
  </nav>

  <div class="container mt-4">
    <!-- Main Tabs: Components and Pages -->
    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
      <li class="nav-item">
        <button class="nav-link active" id="components-tab" data-bs-toggle="tab" data-bs-target="#components" type="button" role="tab">
          Components
        </button>
      </li>
      <li class="nav-item">
        <button class="nav-link" id="pages-tab" data-bs-toggle="tab" data-bs-target="#pages" type="button" role="tab">
          Pages
        </button>
      </li>
    </ul>

    <div class="tab-content mt-3">
      <!-- COMPONENTS TAB -->
      <div class="tab-pane fade show active" id="components" role="tabpanel">
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>Develop — Component & Page Designer</title>
          <base href="./develop/">
          <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
          <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
          <link rel="stylesheet" href="style.css" />
          <style>
            html,body {
              height: 100%;
              background: linear-gradient(135deg, #f6f7fb 0%, #e9eefa 100%);
            }
            .app-shell {
              height: 100vh;
              display: flex;
              flex-direction: column;
            }
            .topbar {
              background: linear-gradient(90deg, #0d6efd 60%, #4f8cff 100%);
              color: #fff;
              box-shadow: 0 2px 12px rgba(13,110,253,0.08);
              border-bottom: 1px solid #e3e8f0;
            }
            .brand {
              font-weight: 700;
              letter-spacing: .5px;
              font-size: 1.3rem;
              text-shadow: 0 1px 2px rgba(0,0,0,0.04);
            }
            .content {
              flex: 1 1 auto;
              overflow: hidden;
              padding: 2rem 1.5rem 1.5rem 1.5rem;
            }
            .workspace {
              height: calc(100% - 2rem);
              display: flex;
              gap: 2rem;
            }
            .sidebar {
              width: 340px;
              max-width: 40%;
              background: #fff;
              border-radius: 1rem;
              box-shadow: 0 8px 32px rgba(16,24,40,.10);
              overflow: auto;
              border: 1.5px solid #e3e8f0;
              min-width: 260px;
              margin-bottom: 1rem;
            }
            .editor-panel {
              flex: 1 1 auto;
              background: #fff;
              border-radius: 1rem;
              box-shadow: 0 8px 32px rgba(16,24,40,.10);
              overflow: auto;
              display: flex;
              flex-direction: column;
              border: 1.5px solid #e3e8f0;
              min-width: 320px;
            }
            .side-header {
              padding: 1.1rem 1.2rem 1rem 1.2rem;
              border-bottom: 1.5px solid #f0f4fa;
              display: flex;
              gap: .5rem;
              align-items: center;
              justify-content: space-between;
              background: linear-gradient(90deg, #f8fafc 80%, #e9eefa 100%);
              border-top-left-radius: 1rem;
              border-top-right-radius: 1rem;
            }
            .list-wrap {
              padding: 1rem 1.2rem 1.2rem 1.2rem;
            }
            .list-group-item {
              cursor: pointer;
              user-select: none;
              border: none;
              border-radius: 6px;
              margin-bottom: 4px;
              background: #f7faff;
              transition: background 0.15s, box-shadow 0.15s;
              font-size: 1.01rem;
            }
            .list-group-item.active, .list-group-item:hover {
              background: linear-gradient(90deg, #e3f0ff 60%, #f0f7ff 100%);
              box-shadow: 0 2px 8px rgba(13,110,253,0.07);
              color: #0d6efd;
            }
            textarea.form-control {
              font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
              font-size: 1.05rem;
              line-height: 1.5;
              resize: vertical;
              min-height: 220px;
              background: #f8fafd;
              border-radius: 8px;
              border: 1.5px solid #e3e8f0;
              box-shadow: 0 1px 4px rgba(16,24,40,.04);
              transition: border 0.15s;
            }
            textarea.form-control:focus {
              border-color: #0d6efd;
              background: #f4f8ff;
              outline: none;
            }
            .editor-toolbar {
              padding: 1.1rem 1.2rem 1rem 1.2rem;
              border-bottom: 1.5px solid #f0f4fa;
              display: flex;
              gap: .5rem;
              align-items: center;
              justify-content: space-between;
              background: linear-gradient(90deg, #f8fafc 80%, #e9eefa 100%);
              border-top-left-radius: 1rem;
              border-top-right-radius: 1rem;
            }
            .editor-body {
              padding: 1.5rem 1.2rem 1.2rem 1.2rem;
              overflow: auto;
              flex: 1 1 auto;
            }
            .muted-small {
              font-size: .92rem;
              color: #7b8a9b;
            }
            .compact-btn {
              padding: .38rem .7rem;
              font-size: .98rem;
              border-radius: 6px;
              box-shadow: 0 1px 4px rgba(16,24,40,.04);
              transition: background 0.15s, color 0.15s;
            }
            .compact-btn:focus, .compact-btn:hover {
              background: #e3f0ff;
              color: #0d6efd;
            }
            .btn-success, .btn-primary, .btn-warning, .btn-danger {
              border-radius: 6px !important;
              font-weight: 500;
              letter-spacing: .1px;
            }
            .btn-outline-danger {
              border-radius: 6px !important;
            }
            .nav-tabs .nav-link {
              border-radius: 6px 6px 0 0;
              font-weight: 500;
              color: #7b8a9b;
              background: #f8fafc;
              border: none;
              margin-right: 2px;
              transition: background 0.15s, color 0.15s;
            }
            .nav-tabs .nav-link.active {
              background: #e3f0ff;
              color: #0d6efd;
              border-bottom: 2.5px solid #0d6efd;
            }
            .nav-tabs {
              border-bottom: 1.5px solid #e3e8f0;
              margin-bottom: 10px;
            }
            .modal-content {
              border-radius: 1rem;
              box-shadow: 0 8px 32px rgba(16,24,40,.10);
              border: 1.5px solid #e3e8f0;
            }
            .form-control, .form-select {
              border-radius: 6px;
              border: 1.5px solid #e3e8f0;
              background: #f8fafd;
              transition: border 0.15s;
            }
            .form-control:focus, .form-select:focus {
              border-color: #0d6efd;
              background: #f4f8ff;
              outline: none;
            }
            .d-flex.gap-2 > * { margin-right: 0.5rem; }
            .d-flex.gap-2 > *:last-child { margin-right: 0; }
            @media (max-width: 900px) {
              .sidebar { width: 100%; max-width: none; margin-bottom: 1rem; }
              .workspace { flex-direction: column; gap: 1rem; }
            }
            @media (max-width: 600px) {
              .content { padding: 0.5rem; }
              .editor-body, .list-wrap { padding: 0.7rem; }
              .side-header, .editor-toolbar { padding: 0.7rem; }
            }
          </style>
        </head>
        <body>
          <div class="app-shell">
            <!-- Topbar -->
            <nav class="navbar topbar">
              <div class="container-fluid">
                <div class="d-flex align-items-center gap-3">
                  <span class="brand">Develop</span>
                  <span class="muted-small">Component & Page Designer</span>
                </div>
                <div class="d-flex align-items-center gap-2">
                  <button class="btn btn-light btn-sm compact-btn" onclick="recompile()" title="Compile project">
                    <i class="bi bi-hammer"></i> Compile
                  </button>
                  <button class="btn btn-outline-light btn-sm compact-btn" id="open-preview" title="Open preview">
                    <i class="bi bi-box-arrow-up-right"></i>
                  </button>
                </div>
              </div>
            </nav>

            <!-- Main content -->
            <div class="content container-fluid">
              <div class="workspace">
                <!-- Sidebar: Tabs for Components / Pages -->
                <div class="sidebar">
                  <div class="side-header">
                    <div class="d-flex align-items-center gap-2">
                      <div class="btn-group" role="group" aria-label="main tabs">
                        <button id="components-tab" class="btn btn-sm btn-outline-primary active" data-bs-toggle="tab" data-bs-target="#components" type="button">Components</button>
                        <button id="pages-tab" class="btn btn-sm btn-outline-secondary" data-bs-toggle="tab" data-bs-target="#pages" type="button">Pages</button>
                      </div>
                    </div>
                    <div>
                      <button class="btn btn-sm btn-success compact-btn" id="add-component-btn" title="Add item">
                        <i class="bi bi-plus-lg"></i>
                      </button>
                    </div>
                  </div>

                  <div class="tab-content">
                    <!-- Components list -->
                    <div class="tab-pane fade show active" id="components">
                      <div class="list-wrap">
                        <div class="mb-2">
                          <input type="text" id="component-search" class="form-control form-control-sm" placeholder="Search components..." />
                        </div>
                        <ul id="components-list" class="list-group list-group-flush"></ul>
                      </div>
                    </div>

                    <!-- Pages list -->
                    <div class="tab-pane fade" id="pages">
                      <div class="list-wrap">
                        <div class="d-flex gap-2 mb-2">
                          <input type="text" id="page-search" class="form-control form-control-sm" placeholder="Search pages..." />
                          <button class="btn btn-sm btn-success" id="add-page-btn" title="Add page"><i class="bi bi-plus"></i></button>
                        </div>
                        <ul id="pages-list" class="list-group list-group-flush"></ul>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Editor panel -->
                <div class="editor-panel">
                  <div class="editor-toolbar">
                    <div>
                      <strong id="editor-title">Select a component or page</strong>
                      <div class="muted-small" id="editor-subtitle">No item selected</div>
                    </div>
                    <div class="d-flex gap-2">
                      <button id="save-button" class="btn btn-primary d-none">Save</button>
                      <button id="delete-button" class="btn btn-outline-danger d-none">Delete</button>
                    </div>
                  </div>

                  <div class="editor-body">
                    <div class="tab-content">
                      <!-- Component editor view -->
                      <div class="tab-pane fade show active" id="component-editor">
                        <ul class="nav nav-tabs mb-3" id="componentTabs" role="tablist">
                          <li class="nav-item"><button class="nav-link active" id="template-tab" data-bs-toggle="tab" data-bs-target="#template" type="button">Template</button></li>
                          <li class="nav-item"><button class="nav-link" id="script-tab" data-bs-toggle="tab" data-bs-target="#script" type="button">Script</button></li>
                          <li class="nav-item"><button class="nav-link" id="style-tab" data-bs-toggle="tab" data-bs-target="#style" type="button">Style</button></li>
                        </ul>

                        <div class="tab-content">
                          <div class="tab-pane fade show active" id="template" role="tabpanel">
                            <textarea id="template-content" class="form-control" rows="12" placeholder="Component template (HTML)"></textarea>
                          </div>
                          <div class="tab-pane fade" id="script" role="tabpanel">
                            <textarea id="script-content" class="form-control" rows="12" placeholder="Component script (JS)"></textarea>
                          </div>
                          <div class="tab-pane fade" id="style" role="tabpanel">
                            <textarea id="style-content" class="form-control" rows="8" placeholder="Component styles (CSS)"></textarea>
                          </div>
                        </div>
                      </div>

                      <!-- Page editor view -->
                      <div class="tab-pane fade" id="page-editor">
                        <div class="row">
                          <div class="col-md-6">
                            <div class="mb-3">
                              <label for="page-name" class="form-label">Page Name</label>
                              <input type="text" id="page-name" class="form-control" />
                            </div>
                            <div class="mb-3">
                              <label for="page-path" class="form-label">Page Path</label>
                              <input type="text" id="page-path" class="form-control" />
                            </div>
                          </div>
                          <div class="col-md-6">
                            <label class="form-label">Components</label>
                            <div class="d-flex gap-2">
                              <select id="available-components" class="form-select form-select-sm" size="6"></select>
                              <div class="d-flex flex-column gap-2 align-items-center justify-content-center">
                                <button id="add-component-to-page" class="btn btn-sm btn-outline-primary">&gt;</button>
                                <button id="remove-component-from-page" class="btn btn-sm btn-outline-secondary">&lt;</button>
                              </div>
                              <select id="linked-components" class="form-select form-select-sm" size="6"></select>
                            </div>
                          </div>
                        </div>

                        <div class="mt-3 d-flex gap-2">
                          <button id="preview-page-btn" class="btn btn-warning d-none">Preview</button>
                          <button id="save-page-btn" class="btn btn-primary d-none">Save Page</button>
                          <button id="delete-page-btn" class="btn btn-danger d-none">Delete Page</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Add Component Modal -->
          <div class="modal fade" id="addComponentModal" tabindex="-1" aria-labelledby="addComponentModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-sm">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="addComponentModalLabel">Add New Component</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <input type="text" id="new-component-name" class="form-control" placeholder="Enter component name" />
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="button" id="save-new-component-btn" class="btn btn-primary">Add Component</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Add Page Modal -->
          <div class="modal fade" id="addPageModal" tabindex="-1" aria-labelledby="addPageModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-sm">
              <div class="modal-content">
                <div class="modal-header">
                  <h5 class="modal-title" id="addPageModalLabel">Add New Page</h5>
                  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                  <div class="mb-3">
                    <input type="text" id="new-page-name" class="form-control" placeholder="Enter page name" />
                  </div>
                  <div class="mb-3">
                    <input type="text" id="new-page-path" class="form-control" placeholder="Enter page path" />
                  </div>
                </div>
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                  <button type="button" id="save-new-page-btn" class="btn btn-primary">Add Page</button>
                </div>
              </div>
            </div>
          </div>

          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
          <script src="script.js"></script>
        </body>
        </html>
